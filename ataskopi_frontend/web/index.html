<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ataskopi">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>ataskopi</title>
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --sat: env(safe-area-inset-top);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
      --sar: env(safe-area-inset-right);
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #FFFFFF;
      /* White background for bottom */
      overscroll-behavior-y: none;
      /* Prevent rubber-band scrolling on iOS */
    }

    /* Ensure the loading screen covers everything during boot */
    #loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: white;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="loading">
    <img src="icons/Icon-192.png" alt="Logo" style="width: 120px; height: 120px; margin-bottom: 24px;">
    <div
      style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #1E3A5F; border-radius: 50%; animation: spin 1s linear infinite;">
    </div>
  </div>

  <script>
    // Read CSS env() safe area insets and expose as global JS variables
    // Flutter Web cannot read these via MediaQuery, so we pass them manually
    function updateSafeAreaInsets() {
      // Create a hidden div to compute the CSS env variables
      var div = document.createElement('div');
      div.style.cssText = [
        'position:fixed',
        'top:0',
        'left:0',
        'width:1px',
        'height:1px',
        'padding-top:env(safe-area-inset-top)',
        'padding-bottom:env(safe-area-inset-bottom)',
        'padding-left:env(safe-area-inset-left)',
        'padding-right:env(safe-area-inset-right)',
        'pointer-events:none',
        'visibility:hidden',
      ].join(';');
      document.body.appendChild(div);

      // Compute actual pixels
      var cs = getComputedStyle(div);
      var topVal = parseFloat(cs.paddingTop) || 0;
      var bottomVal = parseFloat(cs.paddingBottom) || 0;
      var leftVal = parseFloat(cs.paddingLeft) || 0;
      var rightVal = parseFloat(cs.paddingRight) || 0;

      // Store in window globals for Dart to read
      window._safeAreaTop = topVal;
      window._safeAreaBottom = bottomVal;
      window._safeAreaLeft = leftVal;
      window._safeAreaRight = rightVal;

      document.body.removeChild(div);
      console.log('Safe Area Updated:', topVal, bottomVal);
    }

    // Initial call
    updateSafeAreaInsets();

    // Update on resize or orientation change
    window.addEventListener('resize', updateSafeAreaInsets);
    window.addEventListener('orientationchange', updateSafeAreaInsets);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
